# ═══════════════════════════════════════════════════════
#  Netlify configuration — Ocros Web (static site)
#  No build step required — plain HTML/CSS/JS
# ═══════════════════════════════════════════════════════

[build]
  publish = "."

# ── Security headers (all routes) ───────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=(), payment=()"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://res.cloudinary.com https://img.youtube.com; media-src 'self' https://res.cloudinary.com; frame-src https://www.youtube.com https://player.vimeo.com; connect-src 'self' https://zspmnnrmcfcxdudmiegc.supabase.co https://api.cloudinary.com;"

# ── Cache static assets ──────────────────────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirect root to index ───────────────────────────────
[[redirects]]
  from   = "/"
  to     = "/index.html"
  status = 200
