<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Okros</title>
  <meta name="robots" content="noindex">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'sha256-HKxubbsUEF/IAE6ffsiBBcAMyjf1lOOuEOr+prO0dDY='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'self'">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <!-- Anti-FOUC -->
  <script>(function(){var t=localStorage.getItem('okros-theme')||'dark';document.documentElement.dataset.theme=t;})();</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Sans+3:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #1A2030;
      --text:   #F2EDE6;
      --dim:    #9A9088;
      --accent: #C4956A;
    }
    [data-theme="light"] {
      --bg:     #F0EDE4;
      --text:   #1A120A;
      --dim:    #4A3828;
      --accent: #7C5535;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Source Sans 3', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      transition: background 0.3s, color 0.3s;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .wordmark {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text);
      text-decoration: none;
    }

    .code {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 400;
      color: var(--accent);
      opacity: 0.18;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .message {
      font-size: 0.9rem;
      color: var(--dim);
      max-width: 320px;
      line-height: 1.6;
    }

    .home-link {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 28px;
      border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
      border-radius: 6px;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: background 0.25s, border-color 0.25s;
    }

    .home-link:hover {
      background: color-mix(in srgb, var(--accent) 8%, transparent);
      border-color: color-mix(in srgb, var(--accent) 60%, transparent);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/" class="wordmark" aria-label="Okros — back to home">Okros</a>
    <h1 class="code" aria-hidden="true">404</h1>
    <p class="message">This page doesn't exist — or it used to, and it's gone now.</p>
    <a href="/" class="home-link">Back to home</a>
  </div>
</body>
</html>
