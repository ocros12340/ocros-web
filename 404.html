<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Okros</title>
  <meta name="robots" content="noindex">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'self'">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #141820;
      color: #E8E4DC;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #E8E4DC;
      text-decoration: none;
    }

    .code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 400;
      color: rgba(196,149,106,0.18);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .message {
      font-size: 0.9rem;
      color: #8A8F9E;
      max-width: 320px;
      line-height: 1.6;
    }

    .home-link {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 28px;
      border: 1px solid rgba(196,149,106,0.35);
      border-radius: 6px;
      color: #C4956A;
      text-decoration: none;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: background 0.25s, border-color 0.25s;
    }

    .home-link:hover {
      background: rgba(196,149,106,0.08);
      border-color: rgba(196,149,106,0.6);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/" class="wordmark" aria-label="Okros — back to home">Okros</a>
    <h1 class="code" aria-hidden="true">404</h1>
    <p class="message">This page doesn't exist — or it used to, and it's gone now.</p>
    <a href="/" class="home-link">Back to home</a>
  </div>
</body>
</html>
