<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Okros — Admin</title>
  <!-- Content Security Policy -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://res.cloudinary.com; connect-src https://zspmnnrmcfcxdudmiegc.supabase.co https://api.cloudinary.com; object-src 'none'; base-uri 'self'" />
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #141820;
      --bg-surface: #1A2030;
      --bg-card:   #1E2535;
      --accent:    #C4956A;
      --text:      #E8E4DC;
      --text-dim:  #8A8F9E;
      --text-muted:#5A5F6E;
      --radius:    12px;
      --ease-out:  cubic-bezier(0.22, 1, 0.36, 1);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 40%, rgba(196,149,106,0.06) 0%, transparent 65%);
    }

    .login-box {
      width: 360px;
      padding: 48px 40px;
      background: linear-gradient(148deg, rgba(255,255,255,0.055) 0%, rgba(255,255,255,0.016) 100%);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 8px;
    }

    .login-logo h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 400;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    .login-logo span {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      display: block;
      margin-top: 4px;
    }

    .login-box input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .login-box input:focus { border-color: rgba(196,149,106,0.4); }

    .btn {
      padding: 11px 20px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: var(--accent);
      color: #141820;
      width: 100%;
    }

    .btn-ghost {
      background: rgba(255,255,255,0.06);
      color: var(--text-dim);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn-danger {
      background: rgba(196,60,60,0.15);
      color: #e07070;
      border: 1px solid rgba(196,60,60,0.2);
      font-size: 0.75rem;
      padding: 7px 12px;
    }

    .btn-edit {
      background: rgba(255,255,255,0.06);
      color: var(--text-dim);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.75rem;
      padding: 7px 12px;
    }

    .login-error {
      color: #e07070;
      font-size: 0.8rem;
      text-align: center;
      min-height: 20px;
    }

    /* ── Dashboard ── */
    #dashboard { display: none; }

    .admin-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(20,24,32,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0 clamp(24px, 4vw, 56px);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-nav__brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .admin-nav__brand span {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-left: 10px;
      vertical-align: middle;
    }

    .admin-nav__actions { display: flex; gap: 10px; align-items: center; }

    .admin-main {
      max-width: 1100px;
      margin: 0 auto;
      padding: clamp(32px, 4vw, 56px) clamp(24px, 4vw, 56px);
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    /* ── Category section ── */
    .category-section { display: flex; flex-direction: column; gap: 16px; }

    .category-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .category-header__left { display: flex; align-items: center; gap: 12px; }

    .category-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .category-title {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .category-count {
      font-size: 0.7rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ── Project cards ── */
    .projects-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .project-card {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius);
      transition: border-color 0.3s;
    }

    .project-card:hover { border-color: rgba(255,255,255,0.1); }

    .project-card.hidden-project { opacity: 0.45; }

    .project-card__info { display: flex; flex-direction: column; gap: 4px; min-width: 0; }

    .project-card__title {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project-card__title.empty { color: var(--text-muted); font-style: italic; }

    .project-card__meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .project-card__url {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 400px;
    }

    .tag {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .tag-video { background: rgba(91,173,168,0.15); color: #5BADA8; }
    .tag-audio { background: rgba(155,123,181,0.15); color: #9B7BB5; }
    .tag-hidden { background: rgba(255,255,255,0.05); color: var(--text-muted); }

    .project-card__actions { display: flex; gap: 8px; flex-shrink: 0; }

    .empty-state {
      padding: 28px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      background: rgba(255,255,255,0.02);
      border: 1px dashed rgba(255,255,255,0.07);
      border-radius: var(--radius);
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s var(--ease-out);
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      width: 100%;
      max-width: 520px;
      max-height: calc(100vh - 48px);
      display: flex;
      flex-direction: column;
      background: var(--bg-surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      transform: translateY(16px);
      transition: transform 0.3s var(--ease-out);
      overflow: hidden;
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal__header {
      padding: 24px 28px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal__title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text);
    }

    .modal__close {
      width: 32px; height: 32px;
      border-radius: 6px;
      background: rgba(255,255,255,0.05);
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .modal__close:hover { background: rgba(255,255,255,0.1); }

    .modal__body {
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      flex: 1;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .field input, .field select, .field textarea {
      padding: 10px 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.3s;
      width: 100%;
    }

    .field input:focus, .field select:focus { border-color: rgba(196,149,106,0.4); }

    .field select option { background: var(--bg-surface); }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .field-check {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .field-check input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .field-check span { font-size: 0.85rem; color: var(--text-dim); }

    .modal__footer {
      padding: 16px 28px 24px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal__footer .btn { width: auto; }

    /* ── Change password modal ── */
    #pw-modal .modal { max-width: 400px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 1000;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      background: #2A3444;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(8px);
      opacity: 0;
      transition: all 0.3s var(--ease-out);
      pointer-events: none;
    }

    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(91,173,168,0.3); color: #5BADA8; }
    .toast.error { border-color: rgba(196,60,60,0.3); color: #e07070; }

    /* ── Upload zone ── */
    .upload-zone {
      border: 1.5px dashed rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      transition: border-color 0.3s, background 0.3s;
      cursor: pointer;
      background: rgba(255,255,255,0.02);
    }

    .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(196,149,106,0.06);
    }

    .upload-zone__idle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      font-size: 0.85rem;
    }

    .upload-zone__sub { font-size: 0.78rem; color: var(--text-muted); }

    .upload-browse-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.78rem;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .upload-zone__progress {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .upload-bar-wrap {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .upload-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.2s;
    }

    #upload-status { font-size: 0.78rem; color: var(--text-dim); }

    .upload-zone__done {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #5BADA8;
    }

    #upload-filename {
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .upload-remove-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 2px 4px;
      transition: color 0.2s;
    }
    .upload-remove-btn:hover { color: #e07070; }

    /* ── Confirm dialog ── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .confirm-overlay.open { opacity: 1; pointer-events: all; }

    .confirm-box {
      background: var(--bg-surface);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 28px;
      max-width: 360px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .confirm-box p { color: var(--text-dim); font-size: 0.9rem; line-height: 1.5; }
    .confirm-box strong { color: var(--text); }
    .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* ── Album admin cards ── */
    .album-admin-card {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .album-admin-card:hover { border-color: rgba(255,255,255,0.1); }
    .album-admin-card.hidden-album { opacity: 0.45; }
    .album-admin-header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
    }
    .album-admin-info { display: flex; flex-direction: column; gap: 4px; }
    .album-admin-title { font-size: 0.95rem; font-weight: 500; color: var(--text); }
    .album-admin-meta { font-size: 0.75rem; color: var(--text-muted); display: flex; gap: 10px; align-items: center; }
    .tag-album { background: rgba(196,149,106,0.15); color: #C4956A; }
    .album-admin-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .album-tracks-list {
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 12px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .track-admin-item {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 8px;
    }
    .track-num { font-size: 0.72rem; color: var(--text-muted); text-align: center; font-weight: 500; }
    .track-title-cell { font-size: 0.88rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .add-track-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px;
      background: rgba(255,255,255,0.03);
      border: 1.5px dashed rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
      width: 100%;
    }
    .add-track-btn:hover { border-color: rgba(196,149,106,0.3); color: var(--accent); }
    .section-btn-group { display: flex; gap: 8px; }
  </style>
</head>
<body>

  <!-- ── Login ── -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">
        <h1>Okros</h1>
        <span>Admin Panel</span>
      </div>
      <label for="pw-input" style="position:absolute;width:1px;height:1px;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap">Password</label>
      <input type="password" id="pw-input" placeholder="Password" autocomplete="current-password">
      <button class="btn btn-primary" id="login-btn">Enter</button>
      <p class="login-error" id="login-error"></p>
    </div>
  </div>

  <!-- ── Dashboard ── -->
  <div id="dashboard">
    <nav class="admin-nav">
      <div class="admin-nav__brand">
        Okros <span>Admin</span>
      </div>
      <div class="admin-nav__actions">
        <button class="btn btn-ghost" id="change-pw-btn">Change password</button>
        <button class="btn btn-ghost" id="logout-btn">Logout</button>
      </div>
    </nav>

    <main class="admin-main" id="admin-main">
      <!-- Rendered by JS -->
    </main>
  </div>

  <!-- ── Project modal (add / edit) ── -->
  <div class="modal-overlay" id="project-modal">
    <div class="modal">
      <div class="modal__header">
        <span class="modal__title" id="modal-title">Add project</span>
        <button class="modal__close" id="modal-close" aria-label="Close">✕</button>
      </div>
      <div class="modal__body">
        <input type="hidden" id="modal-id">
        <input type="hidden" id="modal-category">
        <div class="field">
          <label>Project title</label>
          <input type="text" id="modal-proj-title" placeholder="e.g. Short Film — Aftermath" maxlength="200">
        </div>
        <div class="field">
          <label>Description</label>
          <input type="text" id="modal-desc" placeholder="e.g. Director: John Doe · Feature film · Sound design" maxlength="400">
        </div>
        <div class="field">
          <label>Media file</label>
          <div class="upload-zone" id="upload-zone">
            <input type="file" id="upload-input" accept="video/*,audio/*" style="display:none">
            <div class="upload-zone__idle" id="upload-idle">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" opacity="0.4"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <span>Drag & drop file here</span>
              <span class="upload-zone__sub">or <button type="button" class="upload-browse-btn" id="upload-browse">browse</button></span>
            </div>
            <div class="upload-zone__progress" id="upload-progress" style="display:none">
              <div class="upload-bar-wrap"><div class="upload-bar" id="upload-bar"></div></div>
              <span id="upload-status">Uploading…</span>
            </div>
            <div class="upload-zone__done" id="upload-done" style="display:none">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5BADA8" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
              <span id="upload-filename"></span>
              <button type="button" class="upload-remove-btn" id="upload-remove">✕</button>
            </div>
          </div>
          <input type="url" id="modal-url" placeholder="Or paste YouTube URL (https://youtu.be/...), Vimeo URL, or Cloudinary URL" style="margin-top:8px;font-size:0.78rem;opacity:0.7">
        </div>
        <div class="field-row">
          <div class="field">
            <label>Media type</label>
            <select id="modal-media-type">
              <option value="video">Video</option>
              <option value="audio">Audio</option>
            </select>
          </div>
          <div class="field">
            <label>Display order</label>
            <input type="number" id="modal-order" value="0" min="0">
          </div>
        </div>
        <label class="field-check">
          <input type="checkbox" id="modal-visible" checked>
          <span>Visible on site</span>
        </label>
        <div class="field">
          <label>Cover image <span style="color:var(--text-muted);font-size:0.7rem;text-transform:none;letter-spacing:0">(screenshot / album art)</span></label>
          <div class="upload-zone upload-zone--cover" id="cover-zone">
            <input type="file" id="cover-input" accept="image/*" style="display:none">

  <!-- ── Toast ── -->
  <div class="toast" id="toast"></div>

  <!-- Supabase — loaded here (body end) so inline script below can reference it synchronously -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.js"
          integrity="sha256-LbKRLxaTmjshtHKYCnradGszpqQHCLxVXLC+JVxutbE="
          crossorigin="anonymous"></script>
  <script>
    const CLD_CLOUD  = 'dlbardl1q';
    const CLD_PRESET = 'fkr8z3st';

    // ── Cloudinary upload ──────────────────────────────────────────
    const uploadZone    = document.getElementById('upload-zone');
    const uploadInput   = document.getElementById('upload-input');
    const uploadIdle    = document.getElementById('upload-idle');
    const uploadProgress= document.getElementById('upload-progress');
    const uploadDone    = document.getElementById('upload-done');
    const uploadBar     = document.getElementById('upload-bar');
    const uploadStatus  = document.getElementById('upload-status');
    const uploadFilename= document.getElementById('upload-filename');
    const modalUrlInput = document.getElementById('modal-url');

    function resetUploadZone() {
      uploadIdle.style.display = '';
      uploadProgress.style.display = 'none';
      uploadDone.style.display = 'none';
      uploadBar.style.width = '0%';
      uploadInput.value = '';
    }

    const MAX_MEDIA_BYTES = 200 * 1024 * 1024;  // 200 MB
    const MAX_IMAGE_BYTES =  15 * 1024 * 1024;  //  15 MB

    async function uploadFile(file) {
      if (!file.type.startsWith('video/') && !file.type.startsWith('audio/')) {
        toast('Only video and audio files are supported.', 'error');
        return;
      }
      if (file.size > MAX_MEDIA_BYTES) {
        toast('File too large — maximum 200 MB.', 'error');
        return;
      }
      uploadIdle.style.display = 'none';
      uploadProgress.style.display = '';
      uploadDone.style.display = 'none';
      uploadBar.style.width = '0%';
      uploadStatus.textContent = 'Uploading…';

      // Auto-detect resource type
      const isAudio = file.type.startsWith('audio/');
      const isVideo = file.type.startsWith('video/');
      const resourceType = isAudio ? 'video' : (isVideo ? 'video' : 'auto');
      // Note: Cloudinary uses 'video' resource_type for both video AND audio

      const fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', CLD_PRESET);

      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLD_CLOUD}/${resourceType}/upload`);

        xhr.upload.addEventListener('progress', e => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            uploadBar.style.width = pct + '%';
            uploadStatus.textContent = pct + '%';
          }
        });

        xhr.addEventListener('load', () => {
          if (xhr.status === 200) {
            const data = JSON.parse(xhr.responseText);
            const url = data.secure_url;

            // Auto-detect media type from file and set dropdown
            const mediaTypeSelect = document.getElementById('modal-media-type');
            if (isAudio) mediaTypeSelect.value = 'audio';
            else if (isVideo) mediaTypeSelect.value = 'video';

            // Fill URL field
            modalUrlInput.value = url;

            // Show done state
            uploadProgress.style.display = 'none';
            uploadDone.style.display = '';
            uploadFilename.textContent = file.name;
            resolve(url);
          } else {
            uploadStatus.textContent = 'Upload failed.';
            reject(new Error('Upload failed: ' + xhr.status));
          }
        });

        xhr.addEventListener('error', () => {
          uploadStatus.textContent = 'Network error.';
          setTimeout(resetUploadZone, 2000);
          reject(new Error('Network error'));
        });

        xhr.send(fd);
      });
    }

    // Drag & drop
    uploadZone.addEventListener('dragover', e => {
      e.preventDefault();
      uploadZone.classList.add('drag-over');
    });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) uploadFile(file).catch(err => toast(err.message, 'error'));
    });

    // Click to browse
    document.getElementById('upload-browse').addEventListener('click', e => {
      e.stopPropagation();
      uploadInput.click();
    });
    uploadZone.addEventListener('click', () => {
      if (uploadDone.style.display === '') return; // already uploaded — display='' means visible
      uploadInput.click();
    });
    uploadInput.addEventListener('change', () => {
      const file = uploadInput.files[0];
      if (file) uploadFile(file).catch(err => toast(err.message, 'error'));
    });

    // Remove uploaded file
    document.getElementById('upload-remove').addEventListener('click', e => {
      e.stopPropagation();
      resetUploadZone();
      modalUrlInput.value = '';
    });

    // ── Cover image upload ─────────────────────────────────────────
    const coverZone    = document.getElementById('cover-zone');
    const coverInput   = document.getElementById('cover-input');
    const coverIdle    = document.getElementById('cover-idle');
    const coverProgress= document.getElementById('cover-progress');
    const coverDone    = document.getElementById('cover-done');
    const coverBar     = document.getElementById('cover-bar');
    const coverStatus  = document.getElementById('cover-status');
    const coverFilename= document.getElementById('cover-filename');
    const coverPreview = document.getElementById('cover-preview');
    const coverUrlInput= document.getElementById('modal-cover-url');

    function resetCoverZone() {
      coverIdle.style.display = '';
      coverProgress.style.display = 'none';
      coverDone.style.display = 'none';
      coverBar.style.width = '0%';
      coverPreview.src = '';
      coverInput.value = '';
    }

    function compressImage(file, maxPx, quality) {
      return new Promise((resolve) => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          let w = img.width, h = img.height;
          if (w > maxPx || h > maxPx) {
            if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
            else       { w = Math.round(w * maxPx / h); h = maxPx; }
          }
          const c = document.createElement('canvas');
          c.width = w; c.height = h;
          c.getContext('2d').drawImage(img, 0, 0, w, h);
          c.toBlob(blob => resolve(blob || file), 'image/jpeg', quality);
        };
        img.onerror = () => resolve(file);
        img.src = url;
      });
    }

    async function uploadCover(file) {
      if (!file.type.startsWith('image/')) {
        toast('Only image files are supported for cover art.', 'error');
        return;
      }
      if (file.size > MAX_IMAGE_BYTES) {
        toast('Image too large — maximum 15 MB.', 'error');
        return;
      }
      coverIdle.style.display = 'none';
      coverProgress.style.display = '';
      coverDone.style.display = 'none';
      coverBar.style.width = '0%';
      coverStatus.textContent = 'Compressing…';

      const compressed = await compressImage(file, 1920, 0.85);
      coverStatus.textContent = 'Uploading…';

      const fd = new FormData();
      fd.append('file', compressed, 'cover.jpg');
      fd.append('upload_preset', CLD_PRESET);

      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`);

        xhr.upload.addEventListener('progress', e => {
          if (e.lengthComputable) {
            const pct = Math.round((e.loaded / e.total) * 100);
            coverBar.style.width = pct + '%';
            coverStatus.textContent = pct + '%';
          }
        });

        xhr.addEventListener('load', () => {
          if (xhr.status === 200) {
            const data = JSON.parse(xhr.responseText);
            const url = data.secure_url;
            coverUrlInput.value = url;
            coverProgress.style.display = 'none';
            coverDone.style.display = '';
            coverPreview.src = url;
            coverFilename.textContent = file.name;
            resolve(url);
          } else {
            let msg = 'Upload failed.';
            try { const d = JSON.parse(xhr.responseText); if (d.error && d.error.message) msg = d.error.message; } catch(e){}
            coverStatus.textContent = msg;
            reject(new Error(msg));
          }
        });

        xhr.addEventListener('error', () => {
          coverStatus.textContent = 'Network error.';
          setTimeout(resetCoverZone, 2000);
          reject(new Error('Network error'));
        });

        xhr.send(fd);
      });
    }

    coverZone.addEventListener('dragover', e => { e.preventDefault(); coverZone.classList.add('drag-over'); });
    coverZone.addEventListener('dragleave', () => coverZone.classList.remove('drag-over'));
    coverZone.addEventListener('drop', e => {
      e.preventDefault(); coverZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) uploadCover(file).catch(err => toast(err.message, 'error'));
    });
    document.getElementById('cover-browse').addEventListener('click', e => { e.stopPropagation(); coverInput.click(); });
    coverZone.addEventListener('click', () => { if (coverDone.style.display === '') return; coverInput.click(); });
    coverInput.addEventListener('change', () => {
      const file = coverInput.files[0];
      if (file) uploadCover(file).catch(err => toast(err.message, 'error'));
    });
    document.getElementById('cover-remove').addEventListener('click', e => {
      e.stopPropagation(); resetCoverZone(); coverUrlInput.value = '';
    });

    // Show existing cover when editing
    function loadExistingCover(url) {
      if (!url) { resetCoverZone(); return; }
      coverUrlInput.value = url;
      coverIdle.style.display = 'none';
      coverProgress.style.display = 'none';
      coverDone.style.display = '';
      coverPreview.src = url;
      coverFilename.textContent = 'Current cover';
    }

    // ── Album cover upload ─────────────────────────────────────────
    const albumCoverZone     = document.getElementById('album-cover-zone');
    const albumCoverInput    = document.getElementById('album-cover-input');
    const albumCoverIdle     = document.getElementById('album-cover-idle');
    const albumCoverProgress = document.getElementById('album-cover-progress');
    const albumCoverDone     = document.getElementById('album-cover-done');
    const albumCoverBar      = document.getElementById('album-cover-bar');
    const albumCoverStatus   = document.getElementById('album-cover-status');
    const albumCoverFilename = document.getElementById('album-cover-filename');
    const albumCoverPreview  = document.getElementById('album-cover-preview');
    const albumCoverUrlInput = document.getElementById('album-modal-cover-url');

    function resetAlbumCoverZone() {
      albumCoverIdle.style.display = ''; albumCoverProgress.style.display = 'none';
      albumCoverDone.style.display = 'none'; albumCoverBar.style.width = '0%';
      albumCoverPreview.src = ''; albumCoverInput.value = ''; albumCoverUrlInput.value = '';
    }
    function loadExistingAlbumCover(url) {
      if (!url) { resetAlbumCoverZone(); return; }
      albumCoverUrlInput.value = url; albumCoverIdle.style.display = 'none';
      albumCoverDone.style.display = ''; albumCoverPreview.src = url;
      albumCoverFilename.textContent = 'Current cover';
    }
    async function uploadAlbumCover(file) {
      if (!file.type.startsWith('image/')) {
        toast('Only image files are supported for album cover.', 'error');
        return;
      }
      if (file.size > MAX_IMAGE_BYTES) {
        toast('Image too large — maximum 15 MB.', 'error');
        return;
      }
      albumCoverIdle.style.display = 'none'; albumCoverProgress.style.display = '';
      albumCoverDone.style.display = 'none'; albumCoverBar.style.width = '0%';
      albumCoverStatus.textContent = 'Compressing…';
      const compressed = await compressImage(file, 1920, 0.85);
      albumCoverStatus.textContent = 'Uploading…';
      const fd = new FormData(); fd.append('file', compressed, 'cover.jpg'); fd.append('upload_preset', CLD_PRESET);
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLD_CLOUD}/image/upload`);
        xhr.upload.addEventListener('progress', e => {
          if (e.lengthComputable) { const pct = Math.round((e.loaded/e.total)*100); albumCoverBar.style.width=pct+'%'; albumCoverStatus.textContent=pct+'%'; }
        });
        xhr.addEventListener('load', () => {
          if (xhr.status === 200) {
            const data = JSON.parse(xhr.responseText);
            albumCoverUrlInput.value = data.secure_url; albumCoverProgress.style.display = 'none';
            albumCoverDone.style.display = ''; albumCoverPreview.src = data.secure_url;
            albumCoverFilename.textContent = file.name; resolve(data.secure_url);
          } else {
            let msg = 'Upload failed.';
            try { const d = JSON.parse(xhr.responseText); if (d.error) msg = d.error.message; } catch(e) {}
            albumCoverStatus.textContent = msg; reject(new Error(msg));
          }
        });
        xhr.addEventListener('error', () => { albumCoverStatus.textContent = 'Network error.'; setTimeout(resetAlbumCoverZone, 2000); reject(new Error('Network error')); });
        xhr.send(fd);
      });
    }
    albumCoverZone.addEventListener('click', () => {
      if (albumCoverDone.style.display === '') return;
      albumCoverInput.click();
    });
    albumCoverZone.addEventListener('dragover', e => { e.preventDefault(); albumCoverZone.classList.add('drag-over'); });
    albumCoverZone.addEventListener('dragleave', () => albumCoverZone.classList.remove('drag-over'));
    albumCoverZone.addEventListener('drop', e => {
      e.preventDefault(); albumCoverZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) uploadAlbumCover(file).catch(err => toast(err.message, 'error'));
    });
    document.getElementById('album-cover-browse').addEventListener('click', e => { e.stopPropagation(); albumCoverInput.click(); });
    albumCoverInput.addEventListener('change', () => { const f = albumCoverInput.files[0]; if (f) uploadAlbumCover(f).catch(err => toast(err.message,'error')); });
    document.getElementById('album-cover-remove').addEventListener('click', e => { e.stopPropagation(); resetAlbumCoverZone(); });

    // ── Track audio upload ─────────────────────────────────────────
    const trackAudioZone     = document.getElementById('track-audio-zone');
    const trackAudioInput    = document.getElementById('track-audio-input');
    const trackAudioIdle     = document.getElementById('track-audio-idle');
    const trackAudioProgress = document.getElementById('track-audio-progress');
    const trackAudioDone     = document.getElementById('track-audio-done');
    const trackAudioBar      = document.getElementById('track-audio-bar');
    const trackAudioStatus   = document.getElementById('track-audio-status');
    const trackAudioFilename = document.getElementById('track-audio-filename');
    const trackAudioUrlInput = document.getElementById('track-modal-url');

    function resetTrackAudioZone() {
      trackAudioIdle.style.display = ''; trackAudioProgress.style.display = 'none';
      trackAudioDone.style.display = 'none'; trackAudioBar.style.width = '0%';
      trackAudioInput.value = ''; trackAudioUrlInput.value = '';
    }
    async function uploadTrackAudio(file) {
      if (!file.type.startsWith('audio/') && !file.type.startsWith('video/')) {
        toast('Only audio files are supported for track uploads.', 'error');
        return;
      }
      if (file.size > MAX_MEDIA_BYTES) {
        toast('File too large — maximum 200 MB.', 'error');
        return;
      }
      trackAudioIdle.style.display = 'none'; trackAudioProgress.style.display = '';
      trackAudioDone.style.display = 'none'; trackAudioBar.style.width = '0%';
      trackAudioStatus.textContent = 'Uploading…';
      const fd = new FormData(); fd.append('file', file); fd.append('upload_preset', CLD_PRESET);
      return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLD_CLOUD}/video/upload`);

        });
        xhr.addEventListener('load', () => {
          if (xhr.status === 200) {
            const data = JSON.parse(xhr.responseText);
            trackAudioUrlInput.value = data.secure_url; trackAudioProgress.style.display = 'none';
            trackAudioDone.style.display = ''; trackAudioFilename.textContent = file.name; resolve(data.secure_url);
          } else {
            let msg = 'Upload failed.';
            try { const d = JSON.parse(xhr.responseText); if (d.error) msg = d.error.message; } catch(e) {}
            trackAudioStatus.textContent = msg; reject(new Error(msg));
          }
        });
        xhr.addEventListener('error', () => { trackAudioStatus.textContent = 'Network error.'; setTimeout(resetTrackAudioZone, 2000); reject(new Error('Network error')); });
        xhr.send(fd);
      });

    // ── HTML escaping helper (prevents stored XSS in admin templates) ──
    function escHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ── Toast ──────────────────────────────────────────────────────
    function toast(msg, type = '') {
      const el = document.getElementById('toast');
      el.textContent = msg;

      setTimeout(() => { el.className = 'toast'; }, 3000);

    // ── Admin identity (hardcoded — single-user panel) ─────────────
    const ADMIN_EMAIL = 'okros.sound@gmail.com';

    // ── Login (brute-force protection: 5 attempts → 30s lockout) ──────
    // Stored in sessionStorage — page reload does NOT reset the lockout counter
    function _getAttempts()  { return parseInt(sessionStorage.getItem('_okros_attempts') || '0', 10); }
    function _getLocked()    { return parseInt(sessionStorage.getItem('_okros_locked')   || '0', 10); }
    function _setAttempts(n) { sessionStorage.setItem('_okros_attempts', n); }
    function _setLocked(t)   { sessionStorage.setItem('_okros_locked', t);   }

    async function login() {
      const pw = document.getElementById('pw-input').value.trim();
      const errEl = document.getElementById('login-error');
      errEl.textContent = '';
      if (!pw) return;

      // Brute-force lockout check
      const now = Date.now();
      const _lockedUntil = _getLocked();
      if (now < _lockedUntil) {
        const secs = Math.ceil((_lockedUntil - now) / 1000);
        errEl.textContent = `Too many attempts. Try again in ${secs}s.`;
        return;
      }

      // Supabase Auth — replaces client-side SHA-256 comparison
      const { error } = await sb.auth.signInWithPassword({
        email: ADMIN_EMAIL,
        password: pw
      });

      if (error) {
        const att = _getAttempts() + 1;
        _setAttempts(att);
        if (att >= 5) {
          _setLocked(Date.now() + 30_000);
          _setAttempts(0);
          errEl.textContent = 'Too many attempts. Locked for 30 seconds.';
        } else {
          errEl.textContent = `Incorrect password. (${5 - att} attempt${5 - att === 1 ? '' : 's'} left)`;
        }
        document.getElementById('pw-input').value = '';
        return;
      }

      _setAttempts(0);
      _setLocked(0);
      showDashboard();
    }

    async function loadAllAlbumTracks() {
      if (!albums.length) return;
      const { data: allTracks } = await sb.from('projects').select('*')
        .in('album_id', albums.map(a => a.id))
        .order('display_order', { ascending: true })
        .order('created_at',    { ascending: true });
      const trackMap = {};
      (allTracks || []).forEach(t => {
        if (!trackMap[t.album_id]) trackMap[t.album_id] = [];
        trackMap[t.album_id].push(t);
      });
      for (const a of albums) {
        const container = document.getElementById('tracks-' + a.id);
        if (!container) continue;
        const tracks    = trackMap[a.id] || [];
        const eAlbumId  = escHtml(a.id);
        const eCategory = escHtml(a.category);
        const trackHTML = tracks.map((t, i) => {
          const eTId   = escHtml(t.id);
          const eTitle = escHtml(t.title || '(no title)');
          return `
          <div class="track-admin-item">
            <div class="track-num">${i + 1}</div>
            <div class="track-title-cell">${eTitle}</div>
            <div class="track-actions">
              <button class="btn btn-edit" onclick="openEditTrackModal('${eTId}','${eAlbumId}')">Edit</button>

          </div>
        `;}).join('');
        container.innerHTML = trackHTML + `<button class="add-track-btn" onclick="openAddTrackModal('${eAlbumId}','${eCategory}')">+ Add track</button>`;
      }
    }

    async function doDelete() {
      if (!deleteTarget) return;
      const { type, id } = deleteTarget;
      document.getElementById('confirm-overlay').classList.remove('open');
      deleteTarget = null;

      let error;
      if (type === 'album') {
        const { error: tracksErr } = await sb.from('projects').delete().eq('album_id', id); // delete tracks first

        ({ error } = await sb.from('albums').delete().eq('id', id));
        if (error) { toast('Delete failed', 'error'); return; }
        toast('Album deleted', 'success');
      } else {
        ({ error } = await sb.from('projects').delete().eq('id', id));
