<body>

  <a class="skip-link" href="#main-content">Skip to content</a>

  <!-- ─────────────────────────────────────────
       FIXED GEOMETRIC BACKGROUND LAYER
  ───────────────────────────────────────── -->
  <div class="geo-fixed" aria-hidden="true">
    <div class="gf-ring-1"></div>
    <div class="gf-ring-1-inner"></div>
    <div class="gf-ring-2"></div>
    <div class="gf-ring-3"></div>
    <div class="gf-diamond"></div>
    <div class="gf-line gf-line-1"></div>
    <div class="gf-line gf-line-2"></div>
    <div class="gf-dot"></div>
    <div class="gf-dot"></div>
    <div class="gf-dot"></div>
    <div class="gf-dot"></div>
    <div class="gf-dot"></div>
    <div class="gf-dot"></div>
  </div>

  <!-- ─────────────────────────────────────────
       NAVIGATION
  ───────────────────────────────────────── -->
  <okros-nav page="work"></okros-nav>

  <!-- Floating CTA -->
  <a href="/#contact" class="work__float-cta" id="floatCta">
    <span data-i18n="work.cta">Let's work together</span>
    <span class="work__float-cta__arrow" aria-hidden="true">→</span>
  </a>

  <main id="main-content">

  <!-- ─────────────────────────────────────────
       WORK
  ───────────────────────────────────────── -->
  <section class="work" id="work" aria-labelledby="work-title">
    <div class="geo-parallax gp-ring gp-work-ring" data-parallax="-0.10" aria-hidden="true"></div>
    <div class="geo-parallax gp-work-diamond" data-parallax="0.16" aria-hidden="true"></div>

    <!-- ── WORK floating elements ── -->
    <!-- Large waveform across the top -->
    <div class="mp-wrap float-wave" data-mpx="-16" data-mpy="10"
         style="top:6vh; left:-5%; width:70%; opacity:0.8;
                mask-image:linear-gradient(to right, black 30%, transparent 80%);
                -webkit-mask-image:linear-gradient(to right, black 30%, transparent 80%);" aria-hidden="true">
      <svg viewBox="0 0 800 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,80 C50,80 70,25 120,25 C170,25 190,135 240,135
                 C290,135 310,35 360,35 C410,35 430,125 480,125
                 C530,125 550,40 600,40 C650,40 670,110 720,110
                 C760,110 780,75 800,80"
          stroke="rgba(196,149,106,0.5)" stroke-width="2" stroke-linecap="round"/>
        <path d="M0,95 C50,95 70,40 120,40 C170,40 190,150 240,150
                 C290,150 310,50 360,50 C410,50 430,140 480,140
                 C530,140 550,55 600,55 C650,55 670,125 720,125
                 C760,125 780,90 800,95"
          stroke="rgba(196,149,106,0.2)" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Arc — right side -->
    <div class="mp-wrap float-arc" data-mpx="20" data-mpy="-12"
         style="width:clamp(200px,30vw,440px);height:clamp(200px,30vw,440px);top:20vh;right:-8%;
                --arc-c:rgba(196,149,106,0.4);--ar:55s;" aria-hidden="true"></div>

    <!-- EQ bars — amber, bottom left -->
    <div class="mp-wrap float-eq float-eq--amber" data-mpx="-18" data-mpy="14"
         style="bottom:10vh; left:2%; align-items:flex-end;" aria-hidden="true">
      <div class="float-eq__bar" style="width:4px;height:50px; --d:2.2s;--dl:0.1s;--peak:2.3;"></div>
      <div class="float-eq__bar" style="width:4px;height:90px; --d:1.9s;--dl:0.3s;--peak:1.8;"></div>
      <div class="float-eq__bar" style="width:4px;height:70px; --d:2.4s;--dl:0s;  --peak:2.1;"></div>
      <div class="float-eq__bar" style="width:4px;height:110px;--d:1.7s;--dl:0.4s;--peak:1.9;"></div>
      <div class="float-eq__bar" style="width:4px;height:60px; --d:2.0s;--dl:0.2s;--peak:2.4;"></div>
    </div>

    <!-- Nodes -->
    <div class="mp-wrap" data-mpx="30" data-mpy="20" aria-hidden="true" style="top:50vh;right:12%;">
      <div class="float-node" style="width:11px;height:11px;--nc:rgba(196,149,106,1);--nd:4.8s;--ndl:-0.5s;--nop:0.75;"></div>
    </div>
    <div class="container">
      <div class="work__top">
        <div class="work__header">
          <p class="section-label reveal" data-i18n="work.label">Selected Work</p>
          <h1 class="section-title reveal reveal-delay-1" id="work-title" data-i18n="work.title">
            Recent&nbsp;<em>projects.</em>
          </h1>
        </div>
      </div>
    </div>

    <!-- ── Film / Video Sound Design ── -->
    <div class="work-group reveal" data-category="film" id="film">
      <div class="container">
        <div class="work-group__header">
          <h2 class="work-group__label" data-i18n="services.film.title">Film / Video Sound Design</h2>
          <div class="work-group__line"></div>
        </div>
      </div>
      <div class="work__scroll-wrap" role="region" aria-label="Film / Video Sound Design projects">
        <div class="work__track">
          <div class="work-coming-soon" data-i18n="work.coming_soon">Coming soon</div>
        </div>
      </div>
    </div>

    <!-- ── Commercial & Advertising ── -->
    <div class="work-group reveal reveal-delay-1" data-category="comm" id="comm">
      <div class="container">
        <div class="work-group__header">
          <h2 class="work-group__label" data-i18n="services.commercial.title">Commercial &amp; Brand</h2>
          <div class="work-group__line"></div>
        </div>
      </div>
      <div class="work__scroll-wrap" role="region" aria-label="Commercial projects">
        <div class="work__track">
          <div class="work-coming-soon" data-i18n="work.coming_soon">Coming soon</div>
        </div>
      </div>
    </div>

    <!-- ── Film Score Composition ── -->
    <div class="work-group reveal reveal-delay-2" data-category="music" id="music">
      <div class="container">
        <div class="work-group__header">
          <h2 class="work-group__label" data-i18n="services.music.title">Film Score Composition</h2>
          <div class="work-group__line"></div>
        </div>
      </div>
      <div class="work__scroll-wrap" role="region" aria-label="Film score projects">
        <div class="work__track">
          <div class="work-coming-soon" data-i18n="work.coming_soon">Coming soon</div>
        </div>
      </div>
    </div>

    <!-- ── Podcast Production ── -->
    <div class="work-group reveal reveal-delay-3" data-category="pod" id="pod">
      <div class="container">
        <div class="work-group__header">
          <h2 class="work-group__label" data-i18n="services.podcast.title">Podcast Production</h2>
          <div class="work-group__line"></div>
        </div>
      </div>
      <div class="work__scroll-wrap" role="region" aria-label="Podcast projects">
        <div class="work__track">
          <div class="work-coming-soon" data-i18n="work.coming_soon">Coming soon</div>
        </div>
      </div>
    </div>
  </section>

  </main><!-- /#main-content -->
