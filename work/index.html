<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Must run before any paint: prevents browser scroll-restoration jump -->
  <script>history.scrollRestoration = 'manual'; window.scrollTo(0, 0);</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — Okros</title>
  <meta name="description" content="Selected work by Okros — sound design for film, commercial, podcast and electronic music." />

  <!-- Fonts — Playfair Display sync (critical for hero, prevents layout shift);
       Source Sans 3 async (body font, minimal shift risk) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600&display=swap" /></noscript>

  <style>
    /* ─────────────────────────────────────────
       DESIGN TOKENS
    ───────────────────────────────────────── */
    :root {
      /* Base backgrounds — cool midnight blue palette */
      --bg:          #1A2030;
      --bg-surface:  #1F2840;

      /* Section-specific backgrounds */
      --bg-services: #171B20;   /* cool dark blue-gray — hero flows into this */
      --bg-work:     #141820;   /* deep dark, slightly cooler */
      --bg-about:    #161A22;   /* subtly different dark blue */
      --bg-contact:  #12111A;   /* deep violet-dark */

      /* Primary accent — amber */
      --accent:      #C4956A;
      --accent-dim:  #8C6440;

      /* Service accent colors */
      --c-film:      #C4956A;          /* amber */
      --c-film-bg:   rgba(196,149,106,0.08);
      --c-film-glow: rgba(196,149,106,0.18);

      --c-comm:      #5BADA8;          /* muted teal */
      --c-comm-bg:   rgba(91,173,168,0.07);
      --c-comm-glow: rgba(91,173,168,0.16);

      --c-pod:       #C47060;          /* terracotta */
      --c-pod-bg:    rgba(196,112,96,0.07);
      --c-pod-glow:  rgba(196,112,96,0.16);

      --c-music:     #9B7BB5;          /* muted violet */
      --c-music-bg:  rgba(155,123,181,0.07);
      --c-music-glow:rgba(155,123,181,0.16);

      --text:        #F2EDE6;
      --text-muted:  #9A9088;
      --text-dim:    #6B6258;
      --text-bright: #F2EDE6;   /* alias for --text, used in album flip card */
      --muted:       #6B6258;   /* alias for --text-dim, used in album flip card */

      --font-heading: 'Playfair Display', Georgia, serif;
      --font-body:    'Source Sans 3', system-ui, sans-serif;

      --nav-h: 72px;
      --section-pad: clamp(96px, 14vw, 180px);
      --content-w: 1120px;
      --gutter: clamp(24px, 5vw, 64px);

      --ease-out:   cubic-bezier(0.16, 1, 0.3, 1);
      --ease-soft:  cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ─────────────────────────────────────────
       RESET & BASE
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
      overflow-y: scroll;
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    img, video, audio { max-width: 100%; display: block; }
    a { color: inherit; text-decoration: none; }

    /* ─────────────────────────────────────────
       UTILITY
    ───────────────────────────────────────── */
    .container {
      max-width: var(--content-w);
      margin-inline: auto;
      padding-inline: var(--gutter);
    }

    /* ─────────────────────────────────────────
       NAVIGATION
    ───────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 202;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      padding-inline: var(--gutter);
      transition: background 0.6s var(--ease-out), box-shadow 0.6s;
    }

    .nav.scrolled {
      background: rgba(25, 31, 46, 0.88);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      box-shadow: 0 1px 40px rgba(0, 0, 0, 0.4);
    }

    .nav__inner {
      width: 100%;
      max-width: var(--content-w);
      margin-inline: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav__logo {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      text-decoration: none;
      transition: opacity 0.3s;
    }
    .nav__logo:hover { opacity: 0.75; }

    .nav__logomark {
      height: 26px;
      width: auto;
      color: var(--accent);
      flex-shrink: 0;
      transition: color 0.9s ease, opacity 0.5s ease;
      will-change: opacity, color;
    }

    .nav__wordmark {
      font-family: var(--font-heading);
      font-size: 1.45rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text);
      transition: color 0.3s;
    }

    .nav__links {
      display: flex;
      align-items: center;
      gap: 2.5rem;
      list-style: none;
    }

    .nav__links a {
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: color 0.3s;
    }
    .nav__links a:hover { color: var(--text-muted); }
    .nav__link--active { color: var(--accent) !important; }

    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-left: 1.5rem;
    }

    .lang-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      transition: color 0.3s;
      padding: 2px 4px;
    }
    .lang-btn.active { color: var(--accent); }
    .lang-btn:hover  { color: var(--text-muted); }
    .lang-sep        { color: var(--text-dim); font-size: 0.7rem; }

    /* Mobile nav */
    .nav__hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 36px;
      height: 36px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      position: relative;
      z-index: 203; /* always above overlay */
    }
    .nav__hamburger span {
      display: block;
      position: absolute;
      width: 22px;
      height: 1.5px;
      background: var(--text);
      border-radius: 2px;
      transition: transform 0.4s var(--ease-out), opacity 0.3s, top 0.4s var(--ease-out);
    }
    .nav__hamburger span:nth-child(1) { top: 11px; }
    .nav__hamburger span:nth-child(2) { top: 17px; }
    .nav__hamburger span:nth-child(3) { top: 23px; }

    /* X when open */
    .nav__hamburger[aria-expanded="true"] span:nth-child(1) {
      top: 17px; transform: rotate(45deg);
    }
    .nav__hamburger[aria-expanded="true"] span:nth-child(2) {
      opacity: 0; transform: scaleX(0);
    }
    .nav__hamburger[aria-expanded="true"] span:nth-child(3) {
      top: 17px; transform: rotate(-45deg);
    }

    @media (max-width: 768px) {
      .nav__hamburger { display: flex; }
      .nav__links {
        position: fixed;
        inset: 0;
        z-index: 201;
        background: rgba(13, 17, 28, 0.97);
        backdrop-filter: blur(32px);
        -webkit-backdrop-filter: blur(32px);
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 0;
        opacity: 0;
        transform: translateY(-12px);
        transition: opacity 0.4s var(--ease-out), transform 0.4s var(--ease-out);
        pointer-events: none;
      }
      .nav__links.open {
        opacity: 1;
        transform: translateY(0);
        pointer-events: all;
      }
      .nav__links a {
        font-size: clamp(1.6rem, 7vw, 2.2rem);
        letter-spacing: 0.12em;
        padding: 0.75rem 0;
        opacity: 0;
        transform: translateY(16px);
        transition: opacity 0.4s var(--ease-out), transform 0.4s var(--ease-out), color 0.2s;
      }
      .nav__links.open a { opacity: 1; transform: translateY(0); }
      .nav__links.open a:nth-child(1) { transition-delay: 0.05s; }
      .nav__links.open a:nth-child(2) { transition-delay: 0.10s; }
      .nav__links.open a:nth-child(3) { transition-delay: 0.15s; }
      .nav__links.open a:nth-child(4) { transition-delay: 0.20s; }
      .lang-toggle { margin-left: 0; margin-top: 2rem; opacity: 0; transform: translateY(12px); transition: opacity 0.4s 0.25s var(--ease-out), transform 0.4s 0.25s var(--ease-out); }
      .nav__links.open .lang-toggle { opacity: 1; transform: translateY(0); }
    }

    /* iOS scroll lock when mobile menu is open */
    body.menu-open {
      overflow: hidden;
      touch-action: none;
    }

    /* ─────────────────────────────────────────
       HERO
    ───────────────────────────────────────── */
    .hero {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-inline: var(--gutter);
      padding-bottom: clamp(72px, 11vw, 140px);
      padding-top: var(--nav-h);
      position: relative;
      overflow: hidden;
      /* Fallback gradient (shown when no video uploaded) */
      background: linear-gradient(
        to bottom,
        #232D42 0%,
        #1D2638 35%,
        #191F2E 65%,
        #171B20 100%
      );
    }

    /* ── Full-screen video background ──────────────────────── */
    .hero__bg-video {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      z-index: 0;
      /* Hidden until a real video is provided — remove display:none to activate */
      display: none;
    }

    /* Dark cinematic overlay on top of video */
    .hero__bg-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(20, 24, 36, 0.55) 0%,
        rgba(18, 20, 28, 0.70) 60%,
        rgba(23, 27, 32, 0.92) 100%
      );
      z-index: 1;
      /* Activates automatically when the video is shown */
      display: none;
    }
    .hero__bg-video:not([style*="display: none"]) ~ .hero__bg-overlay,
    .hero__bg-video.active ~ .hero__bg-overlay {
      display: block;
    }

    /* Film grain */
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      background-size: 200px;
      pointer-events: none;
      z-index: 0;
      mix-blend-mode: screen;
    }

    /* ── Floating orbs ─────────────────────────────────────── */
    .hero__orb {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(70px);
      will-change: transform;
    }

    /* Orb 1 — large indigo/blue glow, bottom right */
    .hero__orb-1 {
      width: clamp(450px, 70vw, 960px);
      height: clamp(450px, 70vw, 960px);
      bottom: -30%;
      right: -15%;
      background: radial-gradient(circle, rgba(70, 110, 200, 0.13) 0%, rgba(50, 80, 160, 0.06) 45%, transparent 70%);
      animation: orbDrift1 18s ease-in-out infinite;
    }

    /* Orb 2 — teal/cyan, top left */
    .hero__orb-2 {
      width: clamp(280px, 42vw, 600px);
      height: clamp(280px, 42vw, 600px);
      top: 10%;
      left: -10%;
      background: radial-gradient(circle, rgba(50, 150, 170, 0.10) 0%, rgba(30, 110, 130, 0.04) 50%, transparent 70%);
      animation: orbDrift2 24s ease-in-out infinite;
      animation-delay: -9s;
      filter: blur(90px);
    }

    /* Orb 3 — soft violet, top center */
    .hero__orb-3 {
      width: clamp(220px, 32vw, 480px);
      height: clamp(220px, 32vw, 480px);
      top: -8%;
      left: 30%;
      background: radial-gradient(circle, rgba(110, 80, 180, 0.09) 0%, transparent 65%);
      animation: orbDrift3 30s ease-in-out infinite;
      animation-delay: -15s;
      filter: blur(100px);
    }

    /* Orb 4 — amber accent (keeps brand identity) — subtle, bottom left */
    .hero__orb-4 {
      width: clamp(240px, 36vw, 520px);
      height: clamp(240px, 36vw, 520px);
      bottom: 5%;
      left: 10%;
      background: radial-gradient(circle, rgba(196, 149, 106, 0.08) 0%, rgba(180, 120, 60, 0.03) 50%, transparent 70%);
      animation: orbDrift1 22s ease-in-out infinite;
      animation-delay: -7s;
      filter: blur(80px);
    }

    @keyframes orbDrift1 {
      0%,100% { transform: translate(0,    0)    scale(1);    }
      25%     { transform: translate(-3%,  2%)  scale(1.04); }
      50%     { transform: translate(2%,   4%)  scale(0.97); }
      75%     { transform: translate(4%,  -2%)  scale(1.02); }
    }
    @keyframes orbDrift2 {
      0%,100% { transform: translate(0,    0)    scale(1);    }
      33%     { transform: translate(4%,  -3%)  scale(1.06); }
      66%     { transform: translate(-3%,  5%)  scale(0.95); }
    }
    @keyframes orbDrift3 {
      0%,100% { transform: translate(0,    0)    scale(1);    }
      40%     { transform: translate(-5%,  3%)  scale(1.08); }
      80%     { transform: translate(3%,  -4%)  scale(0.94); }
    }

    /* Waveform canvas */
    .hero__waveform {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      height: 50vh;
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
    }

    .hero__content {
      position: relative;
      z-index: 1;
      max-width: var(--content-w);
      margin-inline: auto;
      width: 100%;
    }

    .hero__logomark {
      display: block;
      height: clamp(56px, 8vw, 88px);
      width: auto;
      color: var(--accent);
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 1.1s var(--ease-out) 0.05s forwards;
      filter: drop-shadow(0 0 14px rgba(196, 149, 106, 0.3));
      will-change: opacity, transform;
      transform-origin: center center;
    }

    .hero__label {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.75rem;
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.9s var(--ease-out) 0.2s forwards;
    }

    .hero__name {
      font-family: var(--font-heading);
      font-size: clamp(4.5rem, 14vw, 11rem);
      font-weight: 600;
      line-height: 0.88;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 3rem;
      display: flex;
      overflow: hidden;
    }

    .hero__name .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(40px) rotate(-2deg);
      animation: letterReveal 0.9s var(--ease-out) forwards;
    }

    @keyframes letterReveal {
      to { opacity: 1; transform: translateY(0) rotate(0deg); }
    }

    .hero__divider {
      width: clamp(32px, 4vw, 60px);
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
      margin-bottom: 2rem;
      opacity: 0;
      transform: scaleX(0);
      transform-origin: left;
      animation: scaleIn 1s var(--ease-out) 0.75s forwards;
    }

    .hero__statement {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: clamp(1.05rem, 2.2vw, 1.4rem);
      font-weight: 400;
      color: var(--text-muted);
      max-width: 480px;
      line-height: 1.65;
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 1s var(--ease-out) 0.95s forwards;
    }

    .hero__scroll {
      position: absolute;
      bottom: clamp(28px, 4vw, 52px);
      right: var(--gutter);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: fadeUp 0.9s var(--ease-out) 1.6s forwards;
      z-index: 1;
    }

    .hero__scroll span {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      writing-mode: vertical-rl;
    }

    .hero__scroll-line {
      width: 1px;
      height: 52px;
      background: linear-gradient(to bottom, var(--accent-dim), transparent);
      animation: scrollPulse 3s ease-in-out 2.5s infinite;
    }

    /* ─────────────────────────────────────────
       ANIMATIONS
    ───────────────────────────────────────── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      to { opacity: 1; transform: scaleX(1); }
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.25; transform: scaleY(1); }
      50%       { opacity: 0.8;  transform: scaleY(1.2); }
    }

    /* ─────────────────────────────────────────
       TICKER
    ───────────────────────────────────────── */
    .ticker {
      overflow: hidden;
      padding-block: 1.25rem;
      background: #14181C;
      border-block: 1px solid rgba(91, 173, 168, 0.08);
      position: relative;
      z-index: 1;
    }

    .ticker__track {
      display: flex;
      gap: 0;
      width: max-content;
      animation: tickerScroll 28s linear infinite;
    }

    .ticker:hover .ticker__track {
      animation-play-state: paused;
    }

    .ticker__item {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding-inline: 1.5rem;
      white-space: nowrap;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .ticker__dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--c-comm);
      opacity: 0.5;
      flex-shrink: 0;
    }

    @keyframes tickerScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ─────────────────────────────────────────
       SECTION BASE
    ───────────────────────────────────────── */
    section {
      padding-block: var(--section-pad);
      position: relative;
    }

    /* Gradient transition between sections — replaces hard borders */
    section + section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(196, 149, 106, 0.1) 30%,
        rgba(196, 149, 106, 0.1) 70%,
        transparent 100%
      );
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.8;
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 5vw, 3.75rem);
      font-weight: 600;
      line-height: 1.12;
      color: var(--text);
      margin-bottom: 2.5rem;
    }

    /* Italic accent word in section titles */
    .section-title em {
      font-style: italic;
      font-weight: 400;
      color: var(--accent);
    }

    /* ─────────────────────────────────────────
       WORK
    ───────────────────────────────────────── */
    .work {
      background: var(--bg-work);
      overflow: hidden;
    }

    .work__top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      margin-bottom: clamp(40px, 6vw, 72px);
      flex-wrap: wrap;
    }

    .work__header { flex: 1; min-width: 200px; }

    /* Arrow CTA link */
    .arrow-link {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      transition: gap 0.3s var(--ease-out), opacity 0.3s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .arrow-link:hover { gap: 0.9rem; opacity: 0.8; }
    .arrow-link__arrow {
      font-style: normal;
      font-size: 1.05em;
      line-height: 1;
      transition: transform 0.3s var(--ease-out);
    }
    .arrow-link:hover .arrow-link__arrow { transform: translateX(4px); }

    /* Floating CTA */
    .work__float-cta {
      position: fixed;
      right: clamp(16px, 3vw, 40px);
      top: 20%;
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.75rem 1.3rem 0.75rem 1.1rem;
      background: linear-gradient(148deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 100%);
      backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.09);
      color: var(--accent);
      text-decoration: none;
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      white-space: nowrap;
      opacity: 0;
      transform: translateX(20px);
      transition: opacity 0.5s var(--ease-out), transform 0.5s var(--ease-out),
                  gap 0.3s var(--ease-out), box-shadow 0.3s, border-color 0.3s;
    }
    .work__float-cta.visible {
      opacity: 1;
      transform: translateX(0);
    }
    .work__float-cta:hover {
      gap: 0.85rem;
      border-color: rgba(196,149,106,0.3);
      box-shadow: 0 8px 40px rgba(0,0,0,0.4), 0 0 20px rgba(196,149,106,0.08), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .work__float-cta:hover .work__float-cta__arrow { transform: translateX(4px); }
    .work__float-cta__arrow {
      font-style: normal;
      font-size: 1.05em;
      line-height: 1;
      transition: transform 0.3s var(--ease-out);
    }
    @media (prefers-reduced-motion: reduce) {
      .work__float-cta { transition: none; }
    }
    @media (max-width: 768px) {
      .work__float-cta { display: none; }
    }

    /* Horizontal scroll track */
    .work__scroll-wrap {
      overflow-x: auto;
      overflow-y: visible;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      cursor: grab;
      padding-bottom: 2rem;
    }
    .work__scroll-wrap::-webkit-scrollbar { display: none; }
    .work__scroll-wrap.is-dragging { cursor: grabbing; }

    .work__track {
      display: flex;
      gap: clamp(20px, 2.5vw, 32px);
      width: max-content;
      padding-right: var(--gutter);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .work__track.is-loaded {
      opacity: 1;
    }

    /* Per-work-item accent colors */
    /* Work item color comes from its group */
    .work-group[data-category="film"]  { --grp: var(--c-film);  --grp-glow: var(--c-film-glow);  }
    .work-group[data-category="comm"]  { --grp: var(--c-comm);  --grp-glow: var(--c-comm-glow);  }
    .work-group[data-category="music"] { --grp: var(--c-music); --grp-glow: var(--c-music-glow); }

    .work-group[data-category="pod"]   { --grp: var(--c-pod);   --grp-glow: var(--c-pod-glow);   }

    .work-group .work-item { --wi: var(--grp, var(--accent)); --wi-glow: var(--grp-glow, rgba(196,149,106,0.18)); }

    /* Group layout */
    .work-group {
      margin-bottom: clamp(36px, 5.5vw, 64px);
    }

    .work-group__header {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding-inline: var(--gutter);
      margin-bottom: 1.4rem;
    }

    .work-group__label {
      font-size: 0.68rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--grp, var(--accent));
      white-space: nowrap;
      flex-shrink: 0;
    }

    .work-group__line {
      height: 1px;
      flex: 1;
      background: linear-gradient(90deg, var(--grp, var(--accent)), transparent);
      opacity: 0.22;
    }

    .work-item {
      width: clamp(280px, 36vw, 480px);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .work-item__media {
      background: var(--bg-surface);
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 1.5rem;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.04);
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
      transition: transform 0.5s var(--ease-out), box-shadow 0.5s var(--ease-soft);
    }

    /* Video embed (YouTube / Vimeo) */
    .work-item__media--vimeo {
      padding: 0;
      aspect-ratio: 16/9;
    }
    .work-item__media--vimeo iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* YouTube facade */
    .yt-facade {
      position: absolute;
      inset: 0;
      cursor: pointer;
      background: #000;
    }
    .yt-facade__thumb {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.85;
      transition: opacity 0.3s;
    }
    .yt-facade:hover .yt-facade__thumb { opacity: 0.7; }
    .yt-facade__play {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 64px; height: 64px;
      background: rgba(0,0,0,0.72);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .yt-facade:hover .yt-facade__play {
      background: var(--accent, #C4956A);
      transform: translate(-50%, -50%) scale(1.08);
    }
    .yt-facade__play svg {
      width: 24px; height: 24px;
      fill: #fff;
      margin-left: 4px;
    }

    /* Colored bottom vignette */
    .work-item__media::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 110%, var(--wi-glow, rgba(196,149,106,0.18)) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Slide-in color bar on hover — removed */

    .work-item:hover .work-item__media {
      box-shadow: 0 12px 48px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.06);
    }

    .work-item__media video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .work-item__media audio {
      position: relative;
      width: 90%;
      display: none;
    }

    .work-item__media.media-loaded .work-item__placeholder { display: none; }
    .work-item__media.media-loaded video,
    .work-item__media.media-loaded audio { display: block; }

    /* ── Cover image (audio cards) ── */
    .work-item__media.has-cover {
      justify-content: flex-end;
      padding-bottom: 12px;
      aspect-ratio: 1 / 1;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      background-color: #0a0c14;
    }

    .work-item__cover-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 30%, rgba(10,12,20,0.75) 100%);
      z-index: 1;
      pointer-events: none;
    }

    .work-item__media.has-cover audio {
      position: relative;
      z-index: 2;
      width: 92%;
      display: block;
    }

    /* When loaded, audio shows on top of cover — placeholder stays hidden */
    .work-item__media.has-cover.media-loaded audio { display: block; }

    /* ── Album flip card ── */
    .album-item .album-flip {
      width: 100%;
      aspect-ratio: 1 / 1;
      perspective: 1200px;
      cursor: pointer;
      margin-bottom: 1.5rem;
      /* border és box-shadow a face-eken van, ne az outer wrapperén */
    }
    /* hover mozgás eltávolítva — csak az overlay sötétül, a kártya nem mozdul */
    .album-flip__inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1.000),
                  box-shadow 0.8s ease;
    }
    .album-flip.is-flipped .album-flip__inner { transform: rotateY(180deg); }

    /* Lift */
    @keyframes flip-lift {
      0%   { transform: translateY(0)     scale(1); }
      45%  { transform: translateY(-18px) scale(0.91); }
      100% { transform: translateY(0)     scale(1); }
    }
    /* Forgás a belső elemen */
    @keyframes flip-rotate {
      0%   { transform: rotateY(0deg); }
      100% { transform: rotateY(180deg); }
    }
    @keyframes flip-rotate-back {
      0%   { transform: rotateY(180deg); }
      100% { transform: rotateY(0deg); }
    }

    .album-flip.is-animating {
      animation: flip-lift 0.85s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
    }
    .album-flip.is-animating .album-flip__inner {
      transition: none;
    }
    .album-flip.is-animating.to-back .album-flip__inner {
      animation: flip-rotate      0.85s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
    }
    .album-flip.is-animating:not(.to-back) .album-flip__inner {
      animation: flip-rotate-back 0.85s cubic-bezier(0.645, 0.045, 0.355, 1.000) forwards;
    }
    .album-flip__front,
    .album-flip__back {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    .album-flip__front {
      background: #0a0c14;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
      overflow: hidden;
      transform: translateZ(18px);
    }

    .album-flip__front-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(10,12,20,0.85) 100%);
      display: flex;
      align-items: flex-end;
      padding: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .album-flip:not(.is-flipped):hover .album-flip__front-overlay { opacity: 1; }
    .album-flip__hint {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }
    .album-flip__back {
      transform: rotateY(180deg) translateZ(18px);
      background: #0c1018;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Kártya vastagság — a 90 fokos forduláskor látható él */
    .album-flip__spine {
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 36px;
      transform: translateX(-50%) rotateY(90deg);
      background: linear-gradient(
        to right,
        #080a10,
        #1a1e2c 40%,
        #1a1e2c 60%,
        #080a10
      );
      pointer-events: none;
    }
    .album-back__header {
      padding: 18px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      gap: 3px;
      position: relative;
      flex-shrink: 0;
    }
    .album-back__close {
      position: absolute;
      top: 12px; right: 14px;
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 6px;
      opacity: 0.5;
      transition: opacity 0.2s;
      user-select: none;
    }
    .album-back__close:hover { opacity: 1; }
    .album-back__title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--text-bright);
      padding-right: 28px;
      line-height: 1.3;
    }
    .album-back__desc {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .album-back__tracklist {
      flex: 1;
      overflow-y: auto;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .album-back__tracklist::-webkit-scrollbar { width: 3px; }
    .album-back__tracklist::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .album-track {
      display: grid;
      grid-template-columns: 26px 1fr 26px;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }
    .album-track:hover { background: rgba(255,255,255,0.05); }
    .album-track.is-playing { background: rgba(196,149,106,0.1); }
    .album-track__num { font-size: 0.7rem; color: var(--muted); text-align: center; font-weight: 500; }
    .album-track.is-playing .album-track__num { color: var(--accent, #C4956A); }
    .album-track__title { font-size: 0.86rem; color: rgba(220,218,212,0.82); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .album-track.is-playing .album-track__title { color: var(--text-bright, #E8E4DC); }
    .album-track__icon { font-size: 0.65rem; color: var(--muted); text-align: center; transition: color 0.2s; }
    .album-track:hover .album-track__icon,
    .album-track.is-playing .album-track__icon { color: var(--accent, #C4956A); }
    .album-audio { display: none; }

    /* ── Mini player ── */
    .album-player {
      flex-shrink: 0;
      display: none;
      flex-direction: column;
      gap: 7px;
      margin: 0 8px 8px;
      padding: 11px 14px 13px;
      background: linear-gradient(148deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.025) 100%);
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.09);
    }
    .album-player.is-active { display: flex; }

    .album-player__title {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.03em;
    }

    .album-player__progress {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .album-player__time {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.3);
      min-width: 28px;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .album-player__time--dur { text-align: right; }

    .album-player__bar {
      flex: 1;
      height: 18px;
      display: flex;
      align-items: center;
      cursor: pointer;
      position: relative;
    }
    .album-player__bar::before {
      content: '';
      position: absolute;
      left: 0; right: 0; top: 50%;
      height: 3px;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
    }
    .album-player__fill {
      position: absolute;
      left: 0; top: 50%;
      height: 3px;
      transform: translateY(-50%);
      background: var(--accent, #C4956A);
      border-radius: 2px;
      width: 0%;
      pointer-events: none;
    }
    .album-player__thumb {
      position: absolute;
      top: 50%; left: 0%;
      transform: translate(-50%, -50%);
      width: 11px; height: 11px;
      background: #fff;
      border-radius: 50%;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }
    .album-player__bar:hover .album-player__thumb { opacity: 1; }

    .album-player__controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .album-player__skip {
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      font-size: 0.68rem;
      padding: 4px 8px;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
      user-select: none;
      letter-spacing: 0.02em;
    }
    .album-player__skip:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .album-player__playpause {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--accent, #C4956A);
      color: #08090f;
      font-size: 0.82rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      user-select: none;
      flex-shrink: 0;
      line-height: 1;
      padding-left: 2px; /* optikai igazítás a ▶ ikonnak */
    }
    .album-player__playpause.is-playing { padding-left: 0; }
    .album-player__playpause:hover { background: #d9aa80; transform: scale(1.07); }

    .work-item__footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 0.35rem;
    }


    .work-item__placeholder-icon {
      width: 36px;
      height: 36px;
      opacity: 0.2;
      color: var(--wi, var(--accent));
    }

    .work-item__placeholder-text {
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ── Coming soon ── */
    .work-coming-soon {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: clamp(32px, 5vw, 52px) clamp(24px, 4vw, 48px);
      color: var(--text-dim);
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .work-coming-soon::before {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--grp, var(--accent));
      opacity: 0.35;
      flex-shrink: 0;
    }


    .work-item__title {
      font-family: var(--font-heading);
      font-size: clamp(1.05rem, 1.8vw, 1.25rem);
      font-weight: 600;
      color: var(--text);
      line-height: 1.25;
    }

    .work-item__desc {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-top: 0.4rem;
    }

    /* ─────────────────────────────────────────
       FOOTER
    ───────────────────────────────────────── */
    .footer {
      padding-block: clamp(48px, 7vw, 96px) clamp(32px, 4vw, 52px);
      padding-inline: var(--gutter);
      position: relative;
      background: var(--bg-contact);
    }

    /* Top divider */
    .footer::before {
      content: '';
      position: absolute;
      top: 0;
      left: var(--gutter);
      right: var(--gutter);
      height: 1px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(196, 149, 106, 0.2) 30%,
        rgba(196, 149, 106, 0.2) 70%,
        transparent 100%
      );
    }

    .footer__inner {
      max-width: var(--content-w);
      margin-inline: auto;
    }

    /* Big wordmark row */
    .footer__brand {
      display: flex;
      align-items: baseline;
      gap: 2rem;
      margin-bottom: clamp(32px, 5vw, 64px);
      flex-wrap: wrap;
    }

    .footer__wordmark {
      font-family: var(--font-heading);
      font-size: clamp(3rem, 9vw, 7rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
      text-decoration: none;
    }

    .footer__tagline {
      font-family: var(--font-heading);
      font-style: italic;
      font-size: clamp(0.9rem, 1.8vw, 1.25rem);
      font-weight: 400;
      color: var(--accent);
      padding-bottom: 0.2em;
    }

    /* Bottom row */
    .footer__bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .footer__copy {
      font-size: 0.78rem;
      color: var(--text-dim);
    }

    .footer__back {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.3s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .footer__back:hover { color: var(--accent); }

    /* ─────────────────────────────────────────
       GEOMETRIC BACKGROUND LAYER
    ───────────────────────────────────────── */

    /* Fixed layer — always present, always animating */
    .geo-fixed {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
      opacity: 0.3;
    }

    .geo-fixed > * { position: absolute; }

    /* Large rotating ring — top right */
    .gf-ring-1 {
      width: clamp(400px, 55vw, 750px);
      height: clamp(400px, 55vw, 750px);
      top: -14%;
      right: -8%;
      border-radius: 50%;
      border: 1.5px solid rgba(91, 173, 168, 0.32);
      filter: drop-shadow(0 0 8px rgba(91, 173, 168, 0.18));
      animation: geoRotate 40s linear infinite;
    }

    /* Inner ring inside ring-1, counter-rotate */
    .gf-ring-1-inner {
      width: clamp(240px, 35vw, 480px);
      height: clamp(240px, 35vw, 480px);
      top: calc(-14% + clamp(80px, 10vw, 135px));
      right: calc(-8% + clamp(80px, 10vw, 135px));
      border-radius: 50%;
      border: 1px solid rgba(91, 173, 168, 0.18);
      animation: geoRotate 28s linear infinite reverse;
    }

    /* Medium ring — left side, pulsing */
    .gf-ring-2 {
      width: clamp(300px, 38vw, 560px);
      height: clamp(300px, 38vw, 560px);
      top: 38%;
      left: -12%;
      border-radius: 50%;
      border: 1.5px solid rgba(155, 123, 181, 0.28);
      filter: drop-shadow(0 0 8px rgba(155, 123, 181, 0.15));
      animation: geoRotate 55s linear infinite reverse, geoPulse 8s ease-in-out infinite;
    }

    /* Small crosshair ring — lower right, slow */
    .gf-ring-3 {
      width: clamp(140px, 18vw, 260px);
      height: clamp(140px, 18vw, 260px);
      top: 62%;
      right: 16%;
      border-radius: 50%;
      border: 1px solid rgba(70, 110, 200, 0.35);
      animation: geoRotate 20s linear infinite;
    }

    /* Crosshair lines inside ring-3 */
    .gf-ring-3::before,
    .gf-ring-3::after {
      content: '';
      position: absolute;
      background: rgba(70, 110, 200, 0.25);
    }
    .gf-ring-3::before {
      width: 1px; height: 100%;
      left: 50%; top: 0; transform: translateX(-50%);
    }
    .gf-ring-3::after {
      height: 1px; width: 100%;
      top: 50%; left: 0; transform: translateY(-50%);
    }

    /* Floating diamond — amber, slow drift */
    .gf-diamond {
      width: clamp(70px, 9vw, 140px);
      height: clamp(70px, 9vw, 140px);
      bottom: 22%;
      left: 20%;
      border: 1.5px solid rgba(196, 149, 106, 0.4);
      transform: rotate(45deg);
      filter: drop-shadow(0 0 6px rgba(196, 149, 106, 0.2));
      animation: geoDiamond 18s ease-in-out infinite;
    }

    /* Small scattered dots — bigger and brighter */
    .gf-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(91, 173, 168, 0.7);
      animation: geoDrift ease-in-out infinite;
    }
    .gf-dot:nth-child(1)  { top: 22%; left: 55%; animation-duration: 12s; animation-delay: 0s; }
    .gf-dot:nth-child(2)  { top: 45%; left: 75%; animation-duration: 16s; animation-delay: -4s; }
    .gf-dot:nth-child(3)  { top: 70%; left: 40%; animation-duration: 10s; animation-delay: -7s; background: rgba(155,123,181,0.65); }
    .gf-dot:nth-child(4)  { top: 30%; left: 30%; animation-duration: 14s; animation-delay: -2s; background: rgba(196,149,106,0.6); }
    .gf-dot:nth-child(5)  { top: 80%; left: 65%; animation-duration: 18s; animation-delay: -9s; }
    .gf-dot:nth-child(6)  { top: 55%; left: 88%; animation-duration: 13s; animation-delay: -5s; background: rgba(196,112,96,0.6); }

    /* Line fragments — thicker and brighter */
    .gf-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(91,173,168,0.5), transparent);
      animation: geoLinePulse 6s ease-in-out infinite;
    }
    .gf-line-1 {
      width: clamp(100px, 15vw, 220px);
      top: 28%;
      right: 28%;
      animation-delay: 0s;
    }
    .gf-line-2 {
      width: clamp(60px, 9vw, 140px);
      top: 58%;
      left: 43%;
      transform: rotate(-30deg);
      animation-delay: -3s;
      background: linear-gradient(90deg, transparent, rgba(155,123,181,0.45), transparent);
    }

    /* Geo animations */
    @keyframes geoRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes geoPulse {
      0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
      50%      { opacity: 0.5; transform: scale(1.04) rotate(180deg); }
    }
    @keyframes geoDiamond {
      0%,100% { transform: rotate(45deg) scale(1);    opacity: 0.8; }
      33%     { transform: rotate(52deg) scale(1.06); opacity: 1; }
      66%     { transform: rotate(38deg) scale(0.94); opacity: 0.5; }
    }
    @keyframes geoDrift {
      0%,100% { transform: translate(0, 0); }
      25%     { transform: translate(8px, -12px); }
      50%     { transform: translate(-6px, 8px); }
      75%     { transform: translate(10px, 5px); }
    }
    @keyframes geoLinePulse {
      0%,100% { opacity: 0.4; transform: scaleX(1); }
      50%     { opacity: 1;   transform: scaleX(1.15); }
    }

    /* ── Scroll parallax elements ──────────────────────────────── */
    /* These sit inside sections but move at different rates via JS */
    .geo-parallax {
      position: absolute;
      pointer-events: none;
      will-change: transform;
      z-index: 0;
    }

    .gp-ring {
      border-radius: 50%;
      border: 1.5px solid;
    }

    /* Hero parallax shapes */
    .gp-hero-ring-lg {
      width: clamp(220px, 30vw, 440px);
      height: clamp(220px, 30vw, 440px);
      top: 12%;
      left: 53%;
      border-color: rgba(70, 110, 200, 0.32);
      animation: geoRotate 60s linear infinite;
    }

    .gp-hero-diamond {
      width: clamp(90px, 12vw, 180px);
      height: clamp(90px, 12vw, 180px);
      top: 28%;
      right: 10%;
      border: 1.5px solid rgba(91, 173, 168, 0.38);
      transform: rotate(45deg);
      animation: geoDiamond 22s ease-in-out infinite;
    }

    .gp-hero-line-v {
      width: 1px;
      height: clamp(100px, 15vh, 200px);
      top: 18%;
      right: 24%;
      background: linear-gradient(to bottom, transparent, rgba(155,123,181,0.55), transparent);
      animation: geoLinePulse 7s ease-in-out infinite;
      animation-delay: -2s;
    }

    /* Work section parallax */
    .gp-work-ring {
      width: clamp(200px, 26vw, 380px);
      height: clamp(200px, 26vw, 380px);
      top: -5vh;
      left: -5%;
      border-color: rgba(196, 149, 106, 0.3);
      animation: geoRotate 50s linear infinite;
    }

    .gp-work-diamond {
      width: clamp(60px, 8vw, 120px);
      height: clamp(60px, 8vw, 120px);
      bottom: 15vh;
      right: 5%;
      border: 1.5px solid rgba(196, 112, 96, 0.42);
      transform: rotate(45deg);
      animation: geoDiamond 14s ease-in-out infinite;
    }

    /* ─────────────────────────────────────────
       MOUSE PARALLAX FLOATING ELEMENTS
       Full-page, bold, audio-themed
    ───────────────────────────────────────── */

    .mp-wrap {
      position: absolute;
      pointer-events: none;
      will-change: transform;
      transform: translate3d(var(--mpx, 0px), var(--mpy, 0px), 0);
    }

    /* ── VINYL DISC ─────────────────────────────────────────
       Giant record — dominates hero top-right               */
    .float-vinyl {
      width: clamp(400px, 62vw, 900px);
      height: clamp(400px, 62vw, 900px);
      top: -20%;
      right: -14%;
      border-radius: 50%;
      border: 2px solid rgba(91, 173, 168, 0.45);
      /* Groove rings via box-shadow */
      box-shadow:
        inset 0 0 0 clamp(30px, 4.5vw, 65px)  rgba(91,173,168,0.07),
        inset 0 0 0 clamp(60px, 9vw, 130px)   rgba(91,173,168,0.05),
        inset 0 0 0 clamp(90px, 14vw, 200px)  rgba(91,173,168,0.04),
        inset 0 0 0 clamp(120px, 18vw, 265px) rgba(91,173,168,0.03),
        0 0 60px rgba(91,173,168,0.08);
      filter: drop-shadow(0 0 18px rgba(91,173,168,0.2));
      animation: geoRotate 70s linear infinite;
    }
    .float-vinyl::before {
      content: '';
      position: absolute;
      width: 14%; height: 14%;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      border-radius: 50%;
      border: 2px solid rgba(196,149,106,0.55);
      box-shadow: 0 0 12px rgba(196,149,106,0.2);
    }
    .float-vinyl::after {
      content: '';
      position: absolute;
      width: 38%; height: 1.5px;
      background: linear-gradient(90deg, transparent 0%, rgba(196,149,106,0.5) 40%, rgba(196,149,106,0.5) 60%, transparent 100%);
      top: 18%; right: 6%;
      transform: rotate(32deg);
      transform-origin: right center;
    }

    /* ── WAVEFORM — HERO ────────────────────────────────────
       Wide sine wave spanning hero                          */
    .float-wave {
      width: 110%;
      left: -5%;
      animation: floatWave 14s ease-in-out infinite;
    }
    .float-wave svg { width: 100%; height: 100%; overflow: visible; }
    @keyframes floatWave {
      0%,100% { transform: translateY(0px); }
      50%      { transform: translateY(-18px); }
    }

    /* ── EQ BARS ─────────────────────────────────────────────
       Tall frequency bars, very visible                     */
    .float-eq {
      display: flex;
      align-items: flex-end;
      gap: clamp(5px, 0.7vw, 9px);
    }
    .float-eq__bar {
      border-radius: 3px 3px 0 0;
      background: linear-gradient(to top,
        rgba(91,173,168,0.75) 0%,
        rgba(91,173,168,0.35) 50%,
        rgba(91,173,168,0.08) 100%);
      transform-origin: bottom center;
      animation: eqPulse var(--d,2.4s) ease-in-out infinite;
      animation-delay: var(--dl,0s);
    }
    .float-eq--amber .float-eq__bar {
      background: linear-gradient(to top,
        rgba(196,149,106,0.7) 0%,
        rgba(196,149,106,0.3) 50%,
        rgba(196,149,106,0.06) 100%);
    }
    .float-eq--violet .float-eq__bar {
      background: linear-gradient(to top,
        rgba(155,123,181,0.7) 0%,
        rgba(155,123,181,0.3) 50%,
        rgba(155,123,181,0.06) 100%);
    }
    @keyframes eqPulse {
      0%,100% { transform: scaleY(1);               opacity: 0.75; }
      50%      { transform: scaleY(var(--peak,1.9)); opacity: 1; }
    }

    /* ── OSCILLOSCOPE ─────────────────────────────────────── */
    .float-scope {
      border-radius: 50%;
      border: 1.5px solid rgba(91,173,168,0.38);
      filter: drop-shadow(0 0 10px rgba(91,173,168,0.15));
      animation: geoRotate var(--sr,60s) linear infinite;
    }
    .float-scope::before, .float-scope::after {
      content: '';
      position: absolute;
      background: rgba(91,173,168,0.22);
    }
    .float-scope::before { width:1px; height:100%; left:50%; top:0; transform:translateX(-50%); }
    .float-scope::after  { height:1px; width:100%; top:50%; left:0; transform:translateY(-50%); }

    /* ── SIGNAL LINE ─────────────────────────────────────────
       Horizontal scan / frequency line                      */
    .float-signal {
      height: 1.5px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(196,149,106,0.55) 20%,
        rgba(196,149,106,0.55) 80%,
        transparent 100%);
      animation: signalPulse var(--sp,6s) ease-in-out infinite;
      animation-delay: var(--spd,0s);
    }
    @keyframes signalPulse {
      0%,100% { opacity: 0.5; transform: scaleX(1); }
      50%      { opacity: 1;   transform: scaleX(1.12); }
    }

    /* ── AUDIO NODES ─────────────────────────────────────────
       Glowing dots, multiple sizes                          */
    .float-node {
      border-radius: 50%;
      background: radial-gradient(circle, var(--nc,rgba(91,173,168,1)) 0%, transparent 65%);
      animation: nodePulse var(--nd,4s) ease-in-out infinite;
      animation-delay: var(--ndl,0s);
    }
    @keyframes nodePulse {
      0%,100% { transform: scale(1);    opacity: var(--nop,0.75); }
      50%      { transform: scale(1.7); opacity: 1; }
    }

    /* ── ARC (partial rings used in Services/About) ──────── */
    .float-arc {
      border-radius: 50%;
      border: 1.5px solid transparent;
      border-top-color: var(--arc-c, rgba(155,123,181,0.45));
      border-right-color: var(--arc-c, rgba(155,123,181,0.45));
      filter: drop-shadow(0 0 8px rgba(155,123,181,0.15));
      animation: geoRotate var(--ar,48s) linear infinite;
    }

    /* ─────────────────────────────────────────
       FADE-IN ON SCROLL
    ───────────────────────────────────────── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1s var(--ease-out), transform 1s var(--ease-out);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .reveal-delay-1 { transition-delay: 0.12s; }
    .reveal-delay-2 { transition-delay: 0.24s; }
    .reveal-delay-3 { transition-delay: 0.36s; }

    /* ── Work page overrides ───────────────────── */
    body { background-color: var(--bg-work); }

    /* No translateY on work page reveals — prevents wave/content mismatch */
    .reveal { transform: none; }
    .reveal.visible { transform: none; }

    /* Show track content immediately — don't wait for Supabase */
    .work__track { opacity: 1; }
    .work__track.is-loaded { opacity: 1; }

    /* ─────────────────────────────────────────
       MOBILE PERFORMANCE — zero GPU overhead below 768px
    ───────────────────────────────────────── */
    @media (max-width: 768px) {

      /* ── 1. Kill ALL CSS animations on decorative elements ── */
      .geo-fixed,
      .geo-fixed *,
      .hero__orb,
      .float-arc,
      .float-wave,
      .float-eq,
      .float-eq__bar,
      .float-scope,
      .float-signal,
      .float-node { animation: none !important; }

      /* ── 2. Remove will-change — kills compositing layers ── */
      .geo-fixed,
      .geo-fixed *,
      .geo-parallax,
      .hero__orb,
      .float-wave,
      .float-eq,
      .float-scope,
      .float-signal,
      .float-node { will-change: auto !important; }

      /* ── 3. Remove expensive filters from static elements ── */
      .hero__orb { filter: none !important; opacity: 0.15; }

      /* ── 4. Hide parallax + float shapes entirely ── */
      .geo-parallax,
      .float-wave,
      .float-eq,
      .float-scope,
      .float-signal,
      .float-node { display: none !important; }

      /* ── 5. No backdrop-filter on nav (GPU blur) ── */
      .nav.scrolled {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        background: rgba(13, 17, 28, 0.96) !important;
      }
    }

    .js-page-hidden .geo-fixed,
    .js-page-hidden .geo-fixed * { animation-play-state: paused !important; }

    @media (prefers-reduced-motion: reduce) {
      .geo-fixed, .geo-fixed *, .geo-parallax,
      .float-wave, .float-eq, .float-scope,
      .float-signal, .float-node { animation: none !important; }
    }

    /* Nav logomark always visible — no hero fade on this page */
    .nav__logomark { opacity: 1 !important; transition: color 0.9s ease !important; }

    /* Work section fills the full viewport */
    .work { min-height: 100vh; }

    /* Page entry animation — fade in only, no translateY (prevents wave/content misalign) */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .work > .container {
      animation: fadeIn 0.7s var(--ease-out) 0.05s both;
    }
  </style>
</head>

    // ── Parallax scroll handler ───────────────────────────────────────────────
    (function () {
      const parallaxEls = document.querySelectorAll('[data-parallax]');
      if (!parallaxEls.length) return;
      if (window.innerWidth < 769) return; // skip on mobile
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      // Cache each element's initial offset from the top of the document
      const items = Array.from(parallaxEls).map(el => ({
        el,
        speed: parseFloat(el.dataset.parallax),
        originY: el.getBoundingClientRect().top + window.scrollY,
      }));

      let ticking = false;

      function update() {
        const scrollY = window.scrollY;
        items.forEach(({ el, speed, originY }) => {
          // How far has the element's origin scrolled past the viewport center?
          const delta = scrollY - originY + window.innerHeight * 0.5;
          el.style.transform = `translateY(${delta * speed}px)`;
        });
        ticking = false;
      }

      window.addEventListener('scroll', () => {
        if (!ticking) { requestAnimationFrame(update); ticking = true; }
      }, { passive: true });

      // Initial position
      update();
    })();

    // ── Language switcher ──────────────────────────────────────────────────────
    let currentLang = 'en';

    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('ocros-lang', lang);
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        const val = i18n[lang][key];
        if (val !== undefined) el.innerHTML = val.replace(/\n/g, '<br>');
      });
      document.getElementById('lang-en').classList.toggle('active', lang === 'en');
      document.getElementById('lang-hu').classList.toggle('active', lang === 'hu');
    }

    document.getElementById('lang-en').addEventListener('click', () => setLang('en'));
    document.getElementById('lang-hu').addEventListener('click', () => setLang('hu'));
    setLang(localStorage.getItem('ocros-lang') || 'en');

    const nav = document.getElementById('nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 40);

    // ── Mobile hamburger ───────────────────────────────────────────────────────
    const hamburger = document.getElementById('hamburger');
    const navLinks  = document.getElementById('nav-links');

    function preventScroll(e) { e.preventDefault(); }

    function openMenu() {
      document.body.classList.add('menu-open');
      document.addEventListener('touchmove', preventScroll, { passive: false });
      navLinks.classList.add('open');
      hamburger.setAttribute('aria-expanded', 'true');
    }

    function closeMenu() {
      document.body.classList.remove('menu-open');
      document.removeEventListener('touchmove', preventScroll);
      navLinks.classList.remove('open');
      hamburger.setAttribute('aria-expanded', 'false');
    }

    hamburger.addEventListener('click', () => {
      navLinks.classList.contains('open') ? closeMenu() : openMenu();
    });

    navLinks.querySelectorAll('a').forEach(a => a.addEventListener('click', closeMenu));

    // ── Scroll reveal ──────────────────────────────────────────────────────────
    const revealObs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); } });
    }, { threshold: 0.12 });

    document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

    // ── Work section drag-to-scroll (all groups) ─────────────────────────────
    (function () {
      document.querySelectorAll('.work__scroll-wrap').forEach(function (wrap) {
        let isDown = false, startX, scrollLeft;
        wrap.addEventListener('mousedown', function (e) {
          isDown = true; wrap.classList.add('is-dragging');
          startX = e.pageX - wrap.offsetLeft; scrollLeft = wrap.scrollLeft;
        });
        wrap.addEventListener('mouseleave', function () { isDown = false; wrap.classList.remove('is-dragging'); });
        wrap.addEventListener('mouseup',    function () { isDown = false; wrap.classList.remove('is-dragging'); });
        wrap.addEventListener('mousemove',  function (e) {
          if (!isDown) return; e.preventDefault();
          wrap.scrollLeft = scrollLeft - (e.pageX - wrap.offsetLeft - startX) * 1.2;
        });
      });
    })();

    // ── Hash anchor scroll (from Services page links) ────────────────────────
    // If there's a hash, take over scroll control immediately so the browser
    // Always take control of scroll — prevents browser restoring previous page's
    // scroll position, which causes a visible jump on load.
    history.scrollRestoration = 'manual';
    window.scrollTo(0, 0);

    window.__scrollToHash = function () {
      const hash = window.location.hash.slice(1);
      if (!hash) return;
      const target = document.getElementById(hash);
      if (!target) return;
      const navH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav-h')) || 72;
      const top  = target.getBoundingClientRect().top + window.scrollY - navH - 24;
      window.scrollTo({ top: top, behavior: 'instant' });
    };
    window.addEventListener('hashchange', window.__scrollToHash);

    // ── Footer year ────────────────────────────────────────────────────────────
    document.getElementById('year').textContent = new Date().getFullYear();

    // ── Floating CTA — scroll-driven vertical drift ────────────────────────────
    (function () {
      const floatCta = document.getElementById('floatCta');
      if (!floatCta) return;
      const SHOW_AFTER = 120;   // px — when to appear
      const TOP_START  = 20;    // % — position at top of page
      const TOP_END    = 40;    // % — position at bottom of page
      let ticking = false;

      function updateCta() {
        ticking = false;
        const scrollY   = window.scrollY;
        const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
        const progress  = maxScroll > 0 ? Math.min(1, Math.max(0, scrollY / maxScroll)) : 0;

        // Ease-in-out cubic for smooth feel
        const eased = progress < 0.5
          ? 4 * progress * progress * progress
          : 1 - Math.pow(-2 * progress + 2, 3) / 2;

        const topPct = TOP_START + (TOP_END - TOP_START) * eased;
        floatCta.style.top = topPct.toFixed(2) + '%';

        if (scrollY > SHOW_AFTER) {
          floatCta.classList.add('visible');
        } else {
          floatCta.classList.remove('visible');
        }
      }

      window.addEventListener('scroll', function () {
        if (!ticking) { requestAnimationFrame(updateCta); ticking = true; }
      }, { passive: true });
      updateCta();
    })();

    // ── Mouse parallax — full page ────────────────────────────────────────────
    (function () {
      const mpEls = document.querySelectorAll('[data-mpx]');
      if (!mpEls.length) return;
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      const LERP = 0.06; // fluid, weighted feel

      let targetX = 0, targetY = 0;
      let currentX = 0, currentY = 0;

      document.addEventListener('mousemove', e => {
        targetX = (e.clientX / window.innerWidth  - 0.5);
        targetY = (e.clientY / window.innerHeight - 0.5);
      });

      // Mobile tilt support
      window.addEventListener('deviceorientation', e => {
        if (e.gamma == null) return;
        targetX = Math.max(-0.5, Math.min(0.5, e.gamma        / 25));
        targetY = Math.max(-0.5, Math.min(0.5, (e.beta - 45)  / 25));
      }, { passive: true });

      function tick() {
        requestAnimationFrame(tick);
        currentX += (targetX - currentX) * LERP;
        currentY += (targetY - currentY) * LERP;

        for (let i = 0; i < mpEls.length; i++) {
          const el = mpEls[i];
          const sx = parseFloat(el.dataset.mpx) || 20;
          const sy = parseFloat(el.dataset.mpy) || 20;
          el.style.setProperty('--mpx', (currentX * sx).toFixed(2) + 'px');
          el.style.setProperty('--mpy', (currentY * sy).toFixed(2) + 'px');
        }
      }
      tick();
    })();

    // ── Logo scroll integration ────────────────────────────────────────────────
    (function () {
      const heroMark = document.querySelector('.hero__logomark');
      const navMark  = document.querySelector('.nav__logomark');
      const heroEl   = document.getElementById('hero');
      if (!heroMark || !navMark || !heroEl) return;
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      // Section accent colours — match design tokens
      const sectionColors = {
        hero:     '#C4956A',
        services: '#5BADA8',
        work:     '#C47060',
        about:    '#9B7BB5',
        contact:  '#C4956A',
      };

      // Nav mark always visible on work page
      navMark.style.opacity = '1';

      // ── Section colour morph via IntersectionObserver ─────────────────────
      const colorObs = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            const color = sectionColors[entry.target.id] || sectionColors.hero;
            navMark.style.color = color;
          }
        });
      }, {
        threshold:  0,
        rootMargin: '-20% 0px -55% 0px',
      });

      ['hero', 'services', 'work', 'about', 'contact'].forEach(function (id) {
        const el = document.getElementById(id);
        if (el) colorObs.observe(el);
      });
    })();
  </script>

          btn.addEventListener('click', function (e) {
            e.stopPropagation();
            var skip = parseFloat(btn.dataset.skip);
            audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + skip));
          });
        });

        // ── Flip listeners ───────────────────────────────────────
        front.addEventListener('click', function () {
          triggerFlip(flipEl, true, audio);
        });

        closeBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          triggerFlip(flipEl, false, audio);
        });

        backEl.addEventListener('click', function (e) {
          if (!e.target.closest('.album-track')
              && !e.target.closest('.album-back__close')
              && !e.target.closest('.album-player')) {
            triggerFlip(flipEl, false, audio);
          }
        });

        // ── Track click ──────────────────────────────────────────
        tracks.forEach(function (trackEl) {
          trackEl.addEventListener('click', function () {
            var src = trackEl.dataset.src;
            if (!src) return;

            // Stop a different album's audio
            if (currentAlbumAudio && currentAlbumAudio.el !== audio) {
              currentAlbumAudio.el.pause();
              currentAlbumAudio = null;
            }

            // Same track: toggle play/pause
            if (currentAlbumAudio && currentAlbumAudio.el === audio
                && currentAlbumAudio.trackEl === trackEl) {
              if (!audio.paused) { audio.pause(); }
              else               { audio.play().catch(function () {}); }
              return;
            }

            // Different (or first) track
            audio.pause();      // fires pause → clears old track UI
            resetTracks();      // belt-and-suspenders
            audio.src = src;
            currentAlbumAudio = { el: audio, trackEl: trackEl };
            showPlayer(trackEl);
            audio.play().catch(function () {}); // fires play → sets new track UI
          });
        });
      });
    }

    async function loadAll() {
      var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // Standalone projects (no album)
      var pRes = await sb.from('projects').select('*')
        .eq('visible', true).is('album_id', null)
        .order('display_order', { ascending: true }).order('created_at', { ascending: true });

      // Albums
      var aRes = await sb.from('albums').select('*')
        .eq('visible', true)
        .order('display_order', { ascending: true }).order('created_at', { ascending: true });

      var projects = pRes.data || [];
      var albums   = aRes.data || [];

      // Fetch tracks for each album
      var albumTrackMap = {};
      for (var i = 0; i < albums.length; i++) {
        var tRes = await sb.from('projects').select('*')
          .eq('album_id', albums[i].id)
          .order('display_order', { ascending: true }).order('created_at', { ascending: true });
        albumTrackMap[albums[i].id] = tRes.data || [];
      }

      // Group by category
      var grouped = {};
      projects.forEach(function (p) {
        if (!grouped[p.category]) grouped[p.category] = [];
        grouped[p.category].push(p);
      });
      var albumGrouped = {};
      albums.forEach(function (a) {
        if (!albumGrouped[a.category]) albumGrouped[a.category] = [];
        albumGrouped[a.category].push(a);
      });

      // Update all categories — show content or "Coming soon"
      var lang = localStorage.getItem('ocros-lang') || 'en';
      ['film', 'comm', 'music', 'pod'].forEach(function (cat) {
        var group = document.querySelector('.work-group[data-category="' + cat + '"]');
        if (!group) return;
        var track = group.querySelector('.work__track');
        if (!track) return;

        var html = '';
        (grouped[cat] || []).forEach(function (p) { html += buildItem(p); });
        (albumGrouped[cat] || []).forEach(function (a) {
          html += buildAlbumCard(a, albumTrackMap[a.id] || []);
        });

        if (html) {
          track.innerHTML = html;
          applyCldMedia(track);
          initAlbumCards(track);
        }
        // else: placeholder "Coming soon" is already in the HTML — leave it as-is
      });

      // Re-apply language after dynamic content is injected
      if (typeof setLang === 'function') {
        setLang(localStorage.getItem('ocros-lang') || 'en');
      }

      // Reveal tracks now that content is settled (prevents flash of empty state)
      document.querySelectorAll('.work__track').forEach(function (t) {
        t.classList.add('is-loaded');
      });

      // Scroll to hash AFTER content is rendered (layout is settled now)
      if (typeof window.__scrollToHash === 'function') {
        window.__scrollToHash();
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadAll);
    } else {
      loadAll();
    }

    // ── YouTube facade click handler ────────────────────────────────────────────
    document.addEventListener('click', function (e) {
      var facade = e.target.closest('.yt-facade');
      if (!facade) return;
      var id = facade.dataset.ytId;
      if (!id) return;
      var wrapper = facade.parentElement;
      var iframe = document.createElement('iframe');
      iframe.src = 'https://www.youtube.com/embed/' + id + '?autoplay=1&rel=0&modestbranding=1';
      iframe.setAttribute('frameborder', '0');
      iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
      iframe.setAttribute('allowfullscreen', '');
      iframe.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;border:none;';
      wrapper.innerHTML = '';
      wrapper.appendChild(iframe);
    });
  })();

  // Pause animations when tab is hidden
  document.addEventListener('visibilitychange', function () {
    document.documentElement.classList.toggle('js-page-hidden', document.hidden);
  });
  </script>
</body>
